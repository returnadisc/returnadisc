{% extends "base.html" %}

{% block title %}{% if lang == 'en' %}Payment confirmed - ReturnaDisc{% else %}Betalning bekräftad - ReturnaDisc{% endif %}{% endblock %}

{% block extra_css %}
<style>
    .confirmation-page {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #166534 0%, #0d3320 100%);
    }

    .confirmation-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 120%;
        background-size: cover;
        background-position: center;
        will-change: transform;
        animation: panImage 25s ease-in-out infinite alternate;
    }

    @keyframes panImage {
        0% { transform: scale(1.1) translate(0, 0); }
        25% { transform: scale(1.15) translate(-2%, -1%); }
        50% { transform: scale(1.1) translate(2%, 1%); }
        75% { transform: scale(1.15) translate(-1%, 2%); }
        100% { transform: scale(1.1) translate(1%, -2%); }
    }

    .confirmation-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7));
        z-index: 1;
    }

    .confirmation-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 700px;
        padding: 20px;
        animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .confirmation-card {
        background: rgba(245, 245, 220, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 50px 40px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-align: center;
    }

    .success-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #166534;
        color: white;
        padding: 10px 24px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .success-badge svg {
        width: 20px;
        height: 20px;
        stroke: white;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .confirmation-header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #1a1a1a;
        margin-bottom: 10px;
        letter-spacing: -1px;
    }

    .confirmation-header h1 span {
        color: #166534;
    }

    .confirmation-subtitle {
        color: #4b5563;
        font-size: 1.1rem;
        margin-bottom: 35px;
        line-height: 1.6;
    }

    /* Timeline style order info */
    .order-timeline {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 30px;
        text-align: left;
        border: 2px solid rgba(22, 101, 52, 0.1);
    }

    .timeline-item {
        display: flex;
        align-items: flex-start;
        gap: 15px;
        padding: 15px 0;
        border-bottom: 1px solid rgba(22, 101, 52, 0.1);
    }

    .timeline-item:last-child {
        border-bottom: none;
    }

    .timeline-icon {
        width: 44px;
        height: 44px;
        background: rgba(22, 101, 52, 0.1);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        flex-shrink: 0;
    }

    .timeline-content {
        flex: 1;
    }

    .timeline-label {
        font-size: 0.85rem;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .timeline-value {
        font-size: 1.1rem;
        color: #1a1a1a;
        font-weight: 700;
    }

    .timeline-value.order-num {
        color: #166534;
        font-family: monospace;
        font-size: 1.2rem;
    }

    .timeline-value.email {
        color: #166534;
    }

    /* Delivery estimate box */
    .delivery-box {
        background: linear-gradient(135deg, #166534 0%, #15803d 100%);
        border-radius: 16px;
        padding: 25px;
        margin-bottom: 30px;
        color: white;
        text-align: left;
        position: relative;
        overflow: hidden;
    }

    .delivery-box::before {
        content: '📦';
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 4rem;
        opacity: 0.2;
    }

    .delivery-box h3 {
        font-size: 1.1rem;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .delivery-box p {
        margin: 0;
        opacity: 0.95;
        line-height: 1.5;
        font-size: 0.95rem;
        max-width: 80%;
    }

    .delivery-time {
        display: inline-block;
        background: #fbbf24;
        color: #1a1a1a;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.9rem;
        margin-top: 10px;
    }

    /* Action buttons */
    .action-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn-yellow {
        background: #fbbf24;
        color: #1a1a1a;
        padding: 16px 36px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        display: inline-block;
        border: 2px solid #fbbf24;
        box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
    }

    .btn-yellow:hover {
        background: transparent;
        color: #1a1a1a;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
    }

    .btn-outline {
        background: transparent;
        color: #166534;
        padding: 16px 36px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        display: inline-block;
        border: 2px solid #166534;
    }

    .btn-outline:hover {
        background: #166534;
        color: white;
        transform: translateY(-2px);
    }

    /* Helper text */
    .helper-text {
        margin-top: 25px;
        color: #6b7280;
        font-size: 0.9rem;
    }

    .helper-text a {
        color: #166534;
        text-decoration: none;
        font-weight: 600;
    }

    .helper-text a:hover {
        text-decoration: underline;
    }

    @media (max-width: 600px) {
        .confirmation-card {
            padding: 30px 20px;
        }

        .confirmation-header h1 {
            font-size: 1.6rem;
        }

        .order-timeline {
            padding: 20px;
        }

        .timeline-item {
            flex-direction: column;
            gap: 10px;
        }

        .delivery-box::before {
            display: none;
        }

        .delivery-box p
